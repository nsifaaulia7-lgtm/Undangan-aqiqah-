<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Aqiqah Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{--main:#54647D}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Playfair Display',serif;color:white;background:#000;overflow-x:hidden}
section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:60px 20px}
.fade{opacity:0;transform:translateY(30px);transition:.7s}
.fade.show{opacity:1;transform:none}

/* loader */
#loader{position:fixed;top:0;left:0;width:100%;height:100vh;background:#f5eedc;display:flex;align-items:center;justify-content:center;z-index:9999;transition:.6s}
.ring{width:50px;height:50px;border:4px solid var(--main);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

button{padding:12px 25px;border:none;border-radius:25px;background:var(--main);color:white;cursor:pointer}

/* music */
.music-btn{position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);color:white;font-size:20px;z-index:999}

/* gallery */
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:500px}
.gallery img{width:100%;height:160px;object-fit:cover;border-radius:10px}
.gallery img.big{grid-column:1/3;height:260px}

/* rsvp */
form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:400px}
input,select,textarea{padding:10px;border-radius:8px;border:none}

#daftarUcapan{max-height:150px;overflow:auto;margin-top:20px}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="ring"></div></div>

<!-- COVER -->
<section id="cover" class="fade">
<h2>Tasyakuran & Aqiqah</h2>
<h1>Nur Sifa Aulia</h1>
<button onclick="openInvitation()">Open Invitation</button>
</section>

<!-- ABOUT -->
<section class="fade">
<h2>Assalamu'alaikum</h2>
<p>Kami mengundang Anda hadir</p>
</section>

<!-- SAVE DATE -->
<section class="fade">
<h2>Save The Date</h2>
<p>03 Mei 2026</p>
<div id="countdown"></div>
<button onclick="addToCalendar()">Simpan</button>
</section>

<!-- MAP -->
<section class="fade">
<h2>Lokasi</h2>
<iframe src="https://www.google.com/maps?q=-3.2704360,114.6264220&z=15&output=embed" width="100%" height="300" style="border-radius:15px"></iframe>
</section>

<!-- GALLERY -->
<section class="fade">
<h2>Gallery</h2>
<div class="gallery">
<img src="foto1.webp" class="big">
<img src="foto1.webp">
<img src="foto1.webp">
</div>
</section>

<!-- RSVP -->
<section class="fade">
<h2>RSVP</h2>
<form id="rsvp-form">
<input type="text" id="nama" placeholder="Nama" required>
<select id="hadir" required>
<option value="">Pilih</option>
<option>Hadir</option>
<option>Tidak Hadir</option>
</select>
<textarea id="ucapan" placeholder="Ucapan"></textarea>
<button type="submit">Kirim</button>
</form>
<div id="daftarUcapan"></div>
</section>

<!-- AUDIO -->
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" class="music-btn">🔊</button>

<script>

// loader cepat
window.addEventListener("DOMContentLoaded",()=>{
setTimeout(()=>{
loader.style.opacity="0";
setTimeout(()=>loader.style.display="none",500)
},700)
})

// open
function openInvitation(){
document.getElementById("cover").style.display="none";
bgMusic.play();
reveal();
}

// reveal
function reveal(){document.querySelectorAll('.fade').forEach(e=>e.classList.add('show'))}

// music toggle
let isPlay=false;
musicBtn.onclick=()=>{
if(!isPlay){bgMusic.play();musicBtn.innerHTML="🔊";isPlay=true}
else{bgMusic.pause();musicBtn.innerHTML="🔇";isPlay=false}
}

// countdown
const target=new Date(2026,4,3,9,0,0).getTime();
setInterval(()=>{
let now=new Date().getTime();
let d=target-now;
if(d<0)return;
let day=Math.floor(d/(1000*60*60*24));
document.getElementById("countdown").innerHTML=day+" hari lagi";
},1000)

// kalender
function addToCalendar(){
const e={start:"20260503T090000",end:"20260503T120000",title:"Aqiqah Nur Sifa Aulia"};
window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${e.title}&dates=${e.start}/${e.end}`)
}

// RSVP API
const API="https://script.google.com/macros/s/AKfycbx-MISCajkdMazSXKC9RkuFup1pZ8VXAiEOLKKWjBfCRBM52j1wdNXdWJvGsPYc4x2NMw/exec";

async function load(){
let r=await fetch(API);let d=await r.json();
daftarUcapan.innerHTML="";
d.reverse().forEach(x=>{
daftarUcapan.innerHTML+=`<div><b>${x.nama}</b><br>${x.ucapan}</div>`
})
}
load();

rsvp-form.onsubmit=async(e)=>{
e.preventDefault();
await fetch(API,{method:"POST",body:JSON.stringify({nama:nama.value,hadir:hadir.value,ucapan:ucapan.value})});
e.target.reset();load();
}

</script>

</body>
</html>
